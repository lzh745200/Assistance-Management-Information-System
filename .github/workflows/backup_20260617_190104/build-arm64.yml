name: Build ARM64 Kylin Installer

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu python3-dev patchelf libc6-dev-arm64-cross
          pip install --upgrade pip
          pip install -r backend/requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install pyinstaller
      - name: Build backend
        run: |
          cd backend
          pyinstaller --name=assistance-backend --onefile --add-data "app:app" --add-data "alembic:alembic" --add-data "alembic.ini:." --hidden-import=uvicorn --hidden-import=sqlalchemy --hidden-import=alembic --hidden-import=bcrypt --hidden-import=passlib --hidden-import=python_jose --hidden-import=multipart --hidden-import=contourpy start.py
      - uses: actions/upload-artifact@v4
        with:
          name: backend-arm64
          path: backend/dist/assistance-backend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-electron:
    name: Build Electron DEB
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install electron
        working-directory: ./electron
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps
          sudo npm install -g electron-builder
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-arm64'
          path: ./artifacts
      - name: Prepare resources
        run: |
          mkdir -p resources/backend resources/frontend
          cp artifacts/backend-arm64/assistance-backend resources/backend/
          chmod +x resources/backend/assistance-backend
          cp -r artifacts/frontend-dist/* resources/frontend/
      - name: Build DEB
        working-directory: ./electron
        run: npx electron-builder --linux --arm64 --deb
      - uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-deb
          path: electron/dist/*.deb

  build-installer:
    name: Build Installer
    runs-on: ubuntu-latest
    needs: [build-electron]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kylin-arm64-deb
          path: ./deb-package
      - name: Package
        run: |
          mkdir -p release
          tar -czf release/assistance-system-kylin-arm64-v1.2.0.tar.gz deb-package/*.deb
      - uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-installer
          path: release/*.tar.gz
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

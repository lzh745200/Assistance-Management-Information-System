name: Build Self-Contained ARM64 Debian Package

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kylin-deb:
    name: Build Kylin V10 ARM64 Standalone DEB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Extract version
        run: |
          VERSION=$(grep -oP 'PROJECT_VERSION\s*=\s*"\K[^"]+' backend/app/core/config.py || echo "1.1.0")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

      - name: Build DEB package via Dockerfile.kylin-standalone
        run: |
          mkdir -p dist/deb/kylin
          docker buildx build \
            --platform linux/arm64 \
            --build-arg VERSION=${{ env.VERSION }} \
            -t assistance-management-kylin:${{ env.VERSION }} \
            -f docker/Dockerfile.kylin-standalone \
            --output type=local,dest=dist/deb/kylin \
            .

      - name: Verify DEB package
        run: |
          ls -lh dist/deb/kylin/*.deb
          file dist/deb/kylin/*.deb

      - name: Upload DEB Package
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-deb
          path: dist/deb/kylin/*.deb
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: dist/deb/kylin/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

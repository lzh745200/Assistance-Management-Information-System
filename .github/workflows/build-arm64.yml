name: Build Self-Contained ARM64 Debian Package

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-backend:
    name: Build ARM64 Backend Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build backend binary in ARM64 Debian Buster container
        run: |
          mkdir -p backend/dist
          docker buildx build \
            --platform linux/arm64 \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t assistance-backend-builder:latest \
            --target builder \
            -f docker/Dockerfile.backend-arm64 \
            --output type=local,dest=backend/dist \
            .

      - name: Verify backend binary
        run: |
          ls -lh backend/dist/assistance-backend
          file backend/dist/assistance-backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-arm64
          path: backend/dist/assistance-backend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps --no-fund --no-audit

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-electron-deb:
    name: Build Electron DEB Package
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps --no-fund --no-audit

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-arm64
          path: ./downloaded/backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./downloaded/frontend

      - name: Prepare resources for electron-builder
        run: |
          # Create backend/dist directory and place ARM64 binary
          # Name it assistance-backend.exe so existing extraResources config picks it up
          # (Linux doesn't care about .exe extension, it's just a filename)
          mkdir -p backend/dist
          cp downloaded/backend/assistance-backend backend/dist/assistance-backend.exe
          chmod +x backend/dist/assistance-backend.exe

          # Place frontend dist
          mkdir -p frontend/dist
          cp -r downloaded/frontend/* frontend/dist/

          # Verify resources
          echo "=== Backend binary ==="
          file backend/dist/assistance-backend.exe
          ls -lh backend/dist/assistance-backend.exe

          echo "=== Frontend dist ==="
          ls frontend/dist/ | head -5

          echo "=== Icon ==="
          ls -lh resources/icons/app-circle-256.png

      - name: Build with electron-builder
        run: |
          npx electron-builder --linux deb --arm64 --publish never
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Verify DEB package
        run: |
          ls -lh dist/electron/*.deb
          file dist/electron/*.deb
          # List contents to verify structure
          dpkg-deb -c dist/electron/*.deb | head -30

      - name: Upload DEB Package
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-deb
          path: dist/electron/*.deb
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: dist/electron/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

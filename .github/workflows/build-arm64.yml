name: Build Self-Contained ARM64 Debian Package

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Backend Binary (ARM64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build Backend with PyInstaller in ARM64 Container
        run: |
          mkdir -p backend/dist
          docker run --rm --platform linux/arm64 \
            -v $(pwd):/workspace \
            -w /workspace/backend \
            arm64v8/python:3.11 \
            bash -c "
              pip install --upgrade pip
              pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
              pip install pyinstaller
              pyinstaller --name=assistance-backend \
                --onefile \
                --add-data 'app:app' \
                --add-data 'alembic:alembic' \
                --add-data 'alembic.ini:.' \
                --hidden-import=uvicorn \
                --hidden-import=sqlalchemy \
                --hidden-import=alembic \
                --hidden-import=bcrypt \
                --hidden-import=passlib \
                --hidden-import=python_jose \
                --hidden-import=multipart \
                --hidden-import=contourpy \
                --hidden-import=pkg_resources \
                start.py
            "
          cp backend/dist/assistance-backend backend/dist/ || echo "未找到产物"
          file backend/dist/assistance-backend

      - name: Upload Backend Binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-arm64
          path: backend/dist/assistance-backend
          if-no-files-found: error

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps
          npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-electron:
    name: Build Debian Package (ARM64)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm config set registry https://registry.npmmirror.com
          if [ -f package-lock.json ]; then rm -f package-lock.json; fi
          npm cache clean --force || true
          npm install --legacy-peer-deps --registry=https://registry.npmmirror.com || \
            npm install --legacy-peer-deps --registry=https://registry.npmjs.org

      - name: Download Backend Binary
        uses: actions/download-artifact@v4
        with:
          name: backend-arm64
          path: ./backend/dist

      - name: Download Frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend/dist

      - name: Prepare Sources
        run: |
          chmod +x backend/dist/assistance-backend
          file backend/dist/assistance-backend
          ls -la frontend/dist/
          # 确保 resources/icon.png 存在（可在仓库中放置默认图标）
          mkdir -p resources
          if [ ! -f resources/icon.png ]; then
            # 如果没有图标，创建一个简单的占位图（实际应预先放入仓库）
            echo "警告：未找到 resources/icon.png，将使用 electron-builder 默认图标"
          fi

      - name: Build Debian Package (ARM64)
        run: |
          npx electron-builder --linux deb --arm64 --publish never
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload Debian Package
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-deb
          path: dist/electron/*.deb
          if-no-files-found: error

  build-installer:
    name: Build Installer (tar.gz)
    runs-on: ubuntu-latest
    needs: [build-electron]
    steps:
      - name: Download Debian Package
        uses: actions/download-artifact@v4
        with:
          name: kylin-arm64-deb
          path: ./deb-package

      - name: Package Installer
        run: |
          mkdir -p release
          DEB_FILE=$(ls deb-package/*.deb | head -n1)
          if [ -f "$DEB_FILE" ]; then
            VERSION=$(echo "$DEB_FILE" | sed -n 's/.*_\(.*\)_arm64\.deb/\1/p')
            [ -z "$VERSION" ] && VERSION="1.2.0"
            tar -czf "release/assistance-system-kylin-arm64-v${VERSION}.tar.gz" -C deb-package .
            echo "✅ 安装包创建完成"
          else
            echo "❌ 未找到 DEB 包"
            exit 1
          fi

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-installer
          path: release/*.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
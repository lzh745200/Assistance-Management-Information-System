name: Build ARM64 Kylin Installer

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # 构建后端
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu python3-dev patchelf libc6-dev-arm64-cross
          pip install -r backend/requirements.txt
          pip install pyinstaller
          
      - name: Build with PyInstaller
        run: |
          cd backend
          pyinstaller --name=assistance-backend --onefile --add-data "app:app" --add-data "alembic:alembic" --add-data "alembic.ini:." --hidden-import=uvicorn --hidden-import=sqlalchemy --hidden-import=alembic start.py
          
      - name: Upload backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-arm64
          path: backend/dist/assistance-backend
          retention-days: 7

  # 构建前端
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm config set registry https://registry.npmmirror.com
          npm ci
          npm run build
          
      - name: Upload frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # 构建 Electron DEB 包
  build-electron:
    name: Build Electron DEB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [build-backend, build-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install electron
        working-directory: ./electron
        run: |
          npm config set registry https://registry.npmmirror.com
          npm ci
          sudo npm install -g electron-builder
          
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-arm64'
          path: ./artifacts
          
      - name: Prepare resources
        run: |
          mkdir -p resources/backend resources/frontend resources/icons
          cp artifacts/backend-arm64/assistance-backend resources/backend/
          chmod +x resources/backend/assistance-backend
          cp -r artifacts/frontend-dist/* resources/frontend/
          
          cat > resources/start-services.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"
          echo "启动帮扶管理信息系统..."
          "$SCRIPT_DIR/backend/assistance-backend" &
          cd "$SCRIPT_DIR/frontend"
          npx serve -s . -l 3000 &
          echo "访问: http://localhost:3000"
          wait
          EOF
          chmod +x resources/start-services.sh
          
      - name: Build DEB
        working-directory: ./electron
        run: npx electron-builder --linux --arm64 --deb
          
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-deb
          path: electron/dist/*.deb
          retention-days: 30

  # 打包完整安装包
  build-installer:
    name: Build Complete Installer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-electron]
    
    steps:
      - name: Download DEB
        uses: actions/download-artifact@v4
        with:
          name: kylin-arm64-deb
          path: ./deb-package
          
      - name: Create installer
        run: |
          cat > install.sh << 'EOF'
          #!/bin/bash
          set -e
          echo "=========================================="
          echo "  帮扶管理信息系统 v1.2.0 安装程序"
          echo "  适用于: 麒麟 V10 ARM64"
          echo "=========================================="
          if [ "$(uname -m)" != "aarch64" ]; then
              echo "错误: 仅支持 ARM64 架构"
              exit 1
          fi
          if [ "$EUID" -ne 0 ]; then 
              echo "请使用: sudo ./install.sh"
              exit 1
          fi
          echo "安装依赖..."
          apt-get update
          apt-get install -y python3 python3-pip nodejs npm libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils
          pip3 install fastapi uvicorn sqlalchemy alembic bcrypt python-jose[cryptography] passlib[bcrypt]
          npm install -g serve
          INSTALL_DIR="/opt/assistance-system"
          mkdir -p $INSTALL_DIR
          tar -xzf /tmp/assistance-system.tar.gz -C $INSTALL_DIR
          chmod +x $INSTALL_DIR/backend/assistance-backend
          chmod +x $INSTALL_DIR/start-services.sh
          cat > /usr/local/bin/assistance-system << 'LAUNCHER'
          #!/bin/bash
          /opt/assistance-system/start-services.sh
          LAUNCHER
          chmod +x /usr/local/bin/assistance-system
          echo "安装完成！"
          echo "启动: assistance-system"
          echo "默认账号: admin / admin123"
          EOF
          chmod +x install.sh
          
          mkdir -p release-kylin
          cp deb-package/*.deb release-kylin/
          cp install.sh release-kylin/
          cd release-kylin
          tar -czf ../assistance-system-kylin-arm64-v1.2.0.tar.gz *
          cd ..
          
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-installer
          path: assistance-system-kylin-arm64-v1.2.0.tar.gz
          retention-days: 30

name: Build Self-Contained ARM64 Kylin Installer

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Backend (ARM64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Cross-Compilation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            python3-dev \
            patchelf \
            libc6-dev-arm64-cross \
            libxml2-dev \
            libxslt1-dev \
            libjpeg-dev \
            zlib1g-dev \
            libpng-dev

      - name: Build Backend
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple --no-cache-dir --no-deps
          pip install fastapi uvicorn sqlalchemy alembic pydantic python-jose passlib bcrypt python-multipart httpx python-dotenv aiofiles Pillow openpyxl loguru || true
          pip install pyinstaller
          cd backend
          # 强制使用交叉编译环境
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          pyinstaller --name=assistance-backend \
            --onefile \
            --add-data "app:app" \
            --add-data "alembic:alembic" \
            --add-data "alembic.ini:." \
            --hidden-import=uvicorn \
            --hidden-import=sqlalchemy \
            --hidden-import=alembic \
            --hidden-import=bcrypt \
            --hidden-import=passlib \
            --hidden-import=python_jose \
            --hidden-import=multipart \
            --hidden-import=contourpy \
            --hidden-import=pkg_resources \
            start.py
          ls -la dist/
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-arm64
          path: backend/dist/assistance-backend
          if-no-files-found: error

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps
          npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-electron:
    name: Build Self-Contained Electron DEB
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm config set registry https://registry.npmmirror.com
          if [ -f package-lock.json ]; then rm -f package-lock.json; fi
          npm cache clean --force || true
          npm install --legacy-peer-deps --registry=https://registry.npmmirror.com || \
            npm install --legacy-peer-deps --registry=https://registry.npmjs.org

      - name: Download Backend
        uses: actions/download-artifact@v4
        with:
          name: backend-arm64
          path: ./backend/dist

      - name: Download Frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend/dist

      - name: Prepare Application Sources
        run: |
          # 确保后端二进制可执行
          chmod +x backend/dist/assistance-backend
          # 确保前端目录存在
          ls -la frontend/dist/

      # 构建未打包的应用（包含 Electron 和前端资源）
      - name: Build Unpacked App (ARM64)
        run: |
          # 使用 electron-builder 生成 unpacked 目录，便于后期处理
          npx electron-builder --linux --arm64 --dir --publish never -c.compression=store

      - name: Prepare Self-Contained Directory
        run: |
          APP_NAME=$(node -p "require('./package.json').name")
          APP_VERSION=$(node -p "require('./package.json').version")
          UNPACKED_DIR=$(find dist -maxdepth 1 -type d -name "*unpacked" | head -n1)
          if [ -z "$UNPACKED_DIR" ]; then
            echo "❌ 未找到 unpacked 目录"
            exit 1
          fi
          echo "✅ 使用 unpacked 目录: $UNPACKED_DIR"

          # 创建自包含包目录结构
          SELF_DIR="dist/self-contained"
          mkdir -p "$SELF_DIR/opt/$APP_NAME"
          mkdir -p "$SELF_DIR/DEBIAN"

          # 复制应用所有文件（包括 Electron 可执行文件、资源、前端等）
          cp -r "$UNPACKED_DIR"/. "$SELF_DIR/opt/$APP_NAME/"

          # 将后端二进制复制到 resources/backend/ 下（主程序会通过 process.resourcesPath 查找）
          mkdir -p "$SELF_DIR/opt/$APP_NAME/resources/backend"
          cp backend/dist/assistance-backend "$SELF_DIR/opt/$APP_NAME/resources/backend/"
          chmod +x "$SELF_DIR/opt/$APP_NAME/resources/backend/assistance-backend"

          # 创建启动脚本（设置 LD_LIBRARY_PATH 并启动主程序）
          cat > "$SELF_DIR/opt/$APP_NAME/start.sh" << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$SCRIPT_DIR/lib:$LD_LIBRARY_PATH"
          exec "$SCRIPT_DIR/$(find . -maxdepth 1 -type f -executable -name 'bumofu-assistance-system' | head -n1)" "$@"
          EOF
          chmod +x "$SELF_DIR/opt/$APP_NAME/start.sh"

          # 创建 desktop 文件（用于菜单启动）
          mkdir -p "$SELF_DIR/usr/share/applications"
          cat > "$SELF_DIR/usr/share/applications/$APP_NAME.desktop" << EOF
          [Desktop Entry]
          Name=帮扶管理系统
          Comment=帮扶管理系统 - 贵州省版
          Exec=/opt/$APP_NAME/start.sh
          Icon=/opt/$APP_NAME/resources/icon.png
          Terminal=false
          Type=Application
          Categories=Office;Utility;
          EOF

          # 创建 DEBIAN/control
          cat > "$SELF_DIR/DEBIAN/control" << EOF
          Package: $APP_NAME
          Version: $APP_VERSION
          Architecture: arm64
          Maintainer: Development Team <dev@bumofu.com>
          Description: Self-contained Bumofu Assistance System for Kylin V10 ARM64
           This package includes all runtime dependencies and requires no external libraries.
          EOF

      - name: Collect Dependencies in ARM64 Container
        run: |
          APP_NAME=$(node -p "require('./package.json').name")
          SELF_DIR="dist/self-contained"
          # 使用 Ubuntu 20.04 ARM64 容器收集动态库
          docker run --rm --platform linux/arm64 \
            -v $(pwd)/$SELF_DIR/opt/$APP_NAME:/app \
            arm64v8/ubuntu:20.04 \
            bash -c "
              set -e
              apt update && apt install -y patchelf file
              cd /app
              # 找到主可执行文件（Electron 主程序）
              MAIN_EXEC=\$(find . -maxdepth 1 -type f -executable | head -n1)
              if [ -z \"\$MAIN_EXEC\" ]; then
                echo '❌ 未找到主可执行文件'
                exit 1
              fi
              echo '主程序:' \$MAIN_EXEC
              mkdir -p lib
              # 复制所有依赖库（包括 libgtk、libxcb 等）
              ldd \"\$MAIN_EXEC\" | grep '=> /' | awk '{print \$3}' | while read lib; do
                if [ -f \"\$lib\" ]; then
                  cp -a \"\$lib\" lib/ 2>/dev/null || echo \"复制 \$lib 失败\"
                fi
              done
              # 修改 RPATH
              find . -type f -executable -exec patchelf --set-rpath '\$ORIGIN/lib' {} \; 2>/dev/null || true
              # 复制必要的系统库（如 libgtk、libxcb）可能未被 ldd 列出，但 Electron 需要
              # 这里安装一些常用 GUI 库并复制
              apt install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libdrm2 libgbm1 libxcb-util1
              cp -a /usr/lib/aarch64-linux-gnu/libgtk-3.so* lib/ 2>/dev/null || true
              cp -a /usr/lib/aarch64-linux-gnu/libgdk-3.so* lib/ 2>/dev/null || true
              cp -a /usr/lib/aarch64-linux-gnu/libnotify.so* lib/ 2>/dev/null || true
              cp -a /usr/lib/aarch64-linux-gnu/libnss3.so* lib/ 2>/dev/null || true
              # ... 可按需添加其他库
              echo '✅ 依赖收集完成'
            "

      - name: Build Debian Package
        run: |
          APP_NAME=$(node -p "require('./package.json').name")
          APP_VERSION=$(node -p "require('./package.json').version")
          SELF_DIR="dist/self-contained"
          # 打包 .deb
          dpkg-deb --build "$SELF_DIR" "${APP_NAME}_${APP_VERSION}_arm64.deb"
          mkdir -p deb-artifacts
          cp "${APP_NAME}_${APP_VERSION}_arm64.deb" deb-artifacts/

      - name: Upload Self-Contained DEB
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-self-contained-deb
          path: deb-artifacts/*.deb
          if-no-files-found: error

  build-installer:
    name: Build Installer (tar.gz)
    runs-on: ubuntu-latest
    needs: [build-electron]
    steps:
      - name: Download Self-Contained DEB
        uses: actions/download-artifact@v4
        with:
          name: kylin-arm64-self-contained-deb
          path: ./deb-package

      - name: Package Installer
        run: |
          mkdir -p release
          DEB_FILE=$(ls deb-package/*.deb | head -n1)
          if [ -f "$DEB_FILE" ]; then
            VERSION=$(echo "$DEB_FILE" | sed -n 's/.*_\(.*\)_arm64\.deb/\1/p')
            [ -z "$VERSION" ] && VERSION="1.2.0"
            tar -czf "release/assistance-system-kylin-arm64-v${VERSION}.tar.gz" -C deb-package .
            echo "✅ 安装包创建完成"
          else
            echo "❌ 未找到 DEB 包"
            exit 1
          fi

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-installer
          path: release/*.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

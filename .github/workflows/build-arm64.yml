name: Build Self-Contained ARM64 Debian Package

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-backend:
    name: Build ARM64 Backend Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build backend binary in ARM64 Debian Buster container
        run: |
          mkdir -p backend/dist
          docker buildx build \
            --platform linux/arm64 \
            --target output \
            -f docker/Dockerfile.backend-arm64 \
            --output type=local,dest=backend/dist \
            .

      - name: Verify backend binary
        run: |
          ls -lh backend/dist/assistance-backend
          file backend/dist/assistance-backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-arm64
          path: backend/dist/assistance-backend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps --no-fund --no-audit

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-electron-deb:
    name: Build Electron DEB Package
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies (ARM64 cross-compile)
        run: |
          npm install --legacy-peer-deps --no-fund --no-audit
        env:
          npm_config_arch: arm64
          npm_config_target_arch: arm64

      - name: Install DEB packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fakeroot dpkg-dev file
          echo "fakeroot: $(which fakeroot)"
          echo "dpkg-deb: $(which dpkg-deb)"

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-arm64
          path: ./downloaded/backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./downloaded/frontend

      - name: Prepare resources for electron-builder
        run: |
          # Create backend/dist directory and place ARM64 binary
          # Name it assistance-backend.exe so existing extraResources config picks it up
          # (Linux doesn't care about .exe extension, it's just a filename)
          mkdir -p backend/dist
          cp downloaded/backend/assistance-backend backend/dist/assistance-backend.exe
          chmod +x backend/dist/assistance-backend.exe

          # Place frontend dist
          mkdir -p frontend/dist
          cp -r downloaded/frontend/* frontend/dist/

          # Verify resources
          echo "=== Backend binary ==="
          file backend/dist/assistance-backend.exe
          ls -lh backend/dist/assistance-backend.exe

          echo "=== Frontend dist ==="
          ls frontend/dist/ | head -5

          echo "=== Icon ==="
          ls -lh resources/icons/app-circle-256.png

      - name: Build with electron-builder
        run: |
          echo "=== Pre-build debug ==="
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "electron-builder: $(npx electron-builder --version)"
          echo "=== Files check ==="
          ls -lh backend/dist/assistance-backend.exe
          ls -lh frontend/dist/index.html
          ls -lh resources/icons/app-circle-256.png
          echo "=== Building DEB ==="
          DEBUG=electron-builder npx electron-builder --linux deb --arm64 --publish never
        env:
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/

      - name: Inject postinst script into DEB
        run: |
          DEB_FILE=$(ls dist/electron/*.deb | head -1)
          echo "Processing: $DEB_FILE"
          
          # Create temp directory for extraction
          mkdir -p deb_work
          cd deb_work
          
          # Extract .deb
          ar x "../$DEB_FILE"
          
          # Extract control archive
          mkdir -p DEBIAN
          tar xf control.tar.* -C DEBIAN/ 2>/dev/null || tar xf control.tar.gz -C DEBIAN/
          
          # Write postinst script
          cat > DEBIAN/postinst << 'POSTINST'
          #!/bin/bash
          set -e
          
          # Find install directory
          for dir in /opt/assistance-management-system /opt/帮扶管理系统; do
            if [ -d "$dir" ]; then
              # Ensure backend binary is executable
              if [ -f "$dir/resources/backend/assistance-backend.exe" ]; then
                chmod +x "$dir/resources/backend/assistance-backend.exe"
              fi
              # Ensure main binary is executable
              if [ -f "$dir/assistance-management-system" ]; then
                chmod +x "$dir/assistance-management-system"
              fi
            fi
          done
          
          # Update desktop database
          if command -v update-desktop-database >/dev/null 2>&1; then
            update-desktop-database /usr/share/applications/ 2>/dev/null || true
          fi
          
          # Update icon cache
          if command -v gtk-update-icon-cache >/dev/null 2>&1; then
            gtk-update-icon-cache /usr/share/icons/ 2>/dev/null || true
          fi
          
          exit 0
          POSTINST
          chmod 755 DEBIAN/postinst
          
          # Repack control archive
          tar czf control.tar.gz -C DEBIAN .
          
          # Repack .deb
          ar rcs "../$DEB_FILE" debian-binary control.tar.gz data.tar.*
          cd ..
          rm -rf deb_work
          
          echo "postinst injected successfully"

      - name: Verify DEB package
        run: |
          ls -lh dist/electron/*.deb
          file dist/electron/*.deb
          # List contents to verify structure
          dpkg-deb -c dist/electron/*.deb | head -30

      - name: Upload DEB Package
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-deb
          path: dist/electron/*.deb
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: dist/electron/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

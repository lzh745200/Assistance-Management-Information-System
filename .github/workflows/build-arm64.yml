name: Build ARM64 Kylin Installer

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: 构建后端 (Python 3.11 + PyInstaller)
  # ============================================================
  build-backend:
    name: Build Backend for Kylin ARM64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            python3-dev \
            patchelf \
            libc6-dev-arm64-cross
          
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install pyinstaller
          
      - name: Build with PyInstaller
        run: |
          cd backend
          pyinstaller --name=assistance-backend \
            --onefile \
            --add-data "app:app" \
            --add-data "alembic:alembic" \
            --add-data "alembic.ini:." \
            --hidden-import=uvicorn \
            --hidden-import=sqlalchemy \
            --hidden-import=alembic \
            --hidden-import=bcrypt \
            --hidden-import=passlib \
            --hidden-import=python_jose \
            --hidden-import=multipart \
            --hidden-import=contourpy \
            start.py
          
      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-arm64
          path: backend/dist/assistance-backend
          retention-days: 7

  # ============================================================
  # Job 2: 构建前端 (Node.js 18 + --legacy-peer-deps)
  # ============================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps
          npm run build
          
      - name: Upload frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ============================================================
  # Job 3: 构建 Electron DEB 包 (ARM64)
  # ============================================================
  build-electron:
    name: Build Electron DEB Package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [build-backend, build-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install electron dependencies
        working-directory: ./electron
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps
          sudo npm install -g electron-builder
          
      - name: Download backend and frontend artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-arm64'
          path: ./artifacts
          
      - name: Prepare electron resources
        run: |
          # 创建资源目录
          mkdir -p resources/backend resources/frontend resources/icons
          
          # 复制后端二进制
          cp artifacts/backend-arm64/assistance-backend resources/backend/
          chmod +x resources/backend/assistance-backend
          
          # 复制前端构建产物
          cp -r artifacts/frontend-dist/* resources/frontend/
          
          # 创建启动脚本
          cat > resources/start-services.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"
          
          echo "=========================================="
          echo "  帮扶管理信息系统 v1.2.0"
          echo "  正在启动服务..."
          echo "=========================================="
          
          # 启动后端
          echo "启动后端服务..."
          "$SCRIPT_DIR/backend/assistance-backend" &
          BACKEND_PID=$!
          
          sleep 3
          
          # 启动前端
          echo "启动前端服务..."
          cd "$SCRIPT_DIR/frontend"
          if command -v serve &> /dev/null; then
              serve -s . -l 3000 &
          else
              npx serve -s . -l 3000 &
          fi
          FRONTEND_PID=$!
          
          echo "=========================================="
          echo "服务已启动！"
          echo "前端地址: http://localhost:3000"
          echo "后端地址: http://localhost:8000"
          echo "API 文档: http://localhost:8000/docs"
          echo "默认账号: admin / admin123"
          echo "=========================================="
          echo "按 Ctrl+C 停止所有服务"
          
          wait $BACKEND_PID $FRONTEND_PID
          EOF
          chmod +x resources/start-services.sh
          
          # 创建桌面快捷方式
          cat > resources/icons/assistance-system.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=帮扶管理信息系统
          Comment=帮扶管理信息系统 - 完全离线运行
          Exec=/opt/assistance-system/start-services.sh
          Icon=/opt/assistance-system/resources/icons/app-icon.png
          Terminal=false
          Categories=Office;Utility;
          DESKTOP
          
      - name: Build Electron for ARM64
        working-directory: ./electron
        run: |
          npx electron-builder --linux --arm64 --deb
          
      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-deb
          path: electron/dist/*.deb
          retention-days: 30

  # ============================================================
  # Job 4: 打包完整麒麟安装包
  # ============================================================
  build-installer:
    name: Build Complete Kylin Installer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-electron]
    
    steps:
      - name: Download DEB package
        uses: actions/download-artifact@v4
        with:
          name: kylin-arm64-deb
          path: ./deb-package
          
      - name: Create installation package
        run: |
          # ==========================================
          # 创建安装脚本
          # ==========================================
          cat > install.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "=========================================="
          echo "  帮扶管理信息系统 v1.2.0 安装程序"
          echo "  适用于: 麒麟 V10 ARM64"
          echo "=========================================="
          
          # 检查系统架构
          if [ "$(uname -m)" != "aarch64" ]; then
              echo "错误: 此安装包仅支持 ARM64 (aarch64) 架构"
              echo "当前架构: $(uname -m)"
              exit 1
          fi
          
          # 检查 root 权限
          if [ "$EUID" -ne 0 ]; then 
              echo "请使用 root 权限运行: sudo ./install.sh"
              exit 1
          fi
          
          echo "步骤 1/5: 安装系统依赖..."
          apt-get update
          apt-get install -y \
              python3 \
              python3-pip \
              nodejs \
              npm \
              libxcb-xinerama0 \
              libxcb-icccm4 \
              libxcb-image0 \
              libxcb-keysyms1 \
              libxcb-randr0 \
              libxcb-render-util0 \
              libxcb-shape0 \
              libxcb-xfixes0 \
              libxcb-xkb1 \
              libxkbcommon-x11-0 \
              libgtk-3-0 \
              libnotify4 \
              libnss3 \
              libxss1 \
              libxtst6 \
              xdg-utils
          
          echo "步骤 2/5: 安装 Python 依赖..."
          pip3 install fastapi uvicorn sqlalchemy alembic bcrypt python-jose[cryptography] passlib[bcrypt] python-multipart
          
          echo "步骤 3/5: 安装 Node.js 依赖..."
          npm install -g serve
          
          echo "步骤 4/5: 安装应用程序..."
          INSTALL_DIR="/opt/assistance-system"
          mkdir -p $INSTALL_DIR
          tar -xzf /tmp/assistance-system.tar.gz -C $INSTALL_DIR
          
          chmod +x $INSTALL_DIR/backend/assistance-backend
          chmod +x $INSTALL_DIR/start-services.sh
          
          # 创建桌面快捷方式
          cp $INSTALL_DIR/resources/icons/assistance-system.desktop /usr/share/applications/
          
          # 创建启动命令
          cat > /usr/local/bin/assistance-system << 'LAUNCHER'
          #!/bin/bash
          /opt/assistance-system/start-services.sh
          LAUNCHER
          chmod +x /usr/local/bin/assistance-system
          
          # 创建停止命令
          cat > /usr/local/bin/stop-assistance-system << 'STOPPER'
          #!/bin/bash
          pkill -f assistance-backend 2>/dev/null || true
          pkill -f "serve -s" 2>/dev/null || true
          echo "服务已停止"
          STOPPER
          chmod +x /usr/local/bin/stop-assistance-system
          
          echo "步骤 5/5: 配置完成！"
          
          echo "=========================================="
          echo "✅ 安装完成！"
          echo ""
          echo "🚀 启动方式:"
          echo "  1. 命令行: assistance-system"
          echo "  2. 应用程序菜单: 帮扶管理信息系统"
          echo ""
          echo "🔑 默认账号: admin / admin123"
          echo "🌐 访问地址: http://localhost:3000"
          echo "=========================================="
          EOF
          
          chmod +x install.sh
          
          # ==========================================
          # 创建 README
          # ==========================================
          cat > README.md << 'EOF'
          # 帮扶管理信息系统 - 麒麟 ARM64 安装包
          
          ## 版本信息
          - **版本**: v1.2.0
          - **架构**: ARM64 (aarch64)
          - **系统**: 麒麟 V10 及兼容系统
          
          ## 安装方法
          
          ```bash
          # 1. 解压
          tar -xzf assistance-system-kylin-arm64-v1.2.0.tar.gz
          cd assistance-system-kylin-arm64
          
          # 2. 安装
          sudo ./install.sh

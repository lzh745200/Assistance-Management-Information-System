name: Build ARM64 Kylin Installer

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            python3-dev \
            patchelf \
            libc6-dev-arm64-cross \
            libxml2-dev \
            libxslt1-dev \
            libjpeg-dev \
            zlib1g-dev \
            libpng-dev

      - name: Build Backend
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple --no-cache-dir --no-deps
          pip install fastapi uvicorn sqlalchemy alembic pydantic python-jose passlib bcrypt python-multipart httpx python-dotenv aiofiles Pillow openpyxl loguru || true
          pip install pyinstaller
          
          cd backend
          pyinstaller --name=assistance-backend \
            --onefile \
            --add-data "app:app" \
            --add-data "alembic:alembic" \
            --add-data "alembic.ini:." \
            --hidden-import=uvicorn \
            --hidden-import=sqlalchemy \
            --hidden-import=alembic \
            --hidden-import=bcrypt \
            --hidden-import=passlib \
            --hidden-import=python_jose \
            --hidden-import=multipart \
            --hidden-import=contourpy \
            --hidden-import=pkg_resources \
            start.py || echo "PyInstaller build failed, but continuing"
          
          ls -la backend/dist/ || echo "No dist directory"
      
      - name: Upload Backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-arm64
          path: backend/dist/assistance-backend
          if-no-files-found: warn

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # 升级到 20 以满足依赖要求
      
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps
          npm run build
      
      - name: Upload Frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-electron:
    name: Build Electron DEB
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # 升级到 20
      
      - name: Install Dependencies (Root)
        run: |
          npm config set registry https://registry.npmmirror.com
          # 尝试安装，如果失败则重试（最多3次）
          for i in {1..3}; do
            npm install --legacy-peer-deps && break || sleep 5
          done
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-arm64'
          path: ./artifacts
      
      - name: Prepare Resources
        run: |
          # 将后端二进制放到 backend/dist/
          mkdir -p backend/dist
          if [ -f artifacts/backend-arm64/assistance-backend ]; then
            cp artifacts/backend-arm64/assistance-backend backend/dist/
            chmod +x backend/dist/assistance-backend
            echo "✅ Backend binary placed in backend/dist/"
          else
            echo "❌ Backend binary not found!"
            exit 1
          fi
          
          # 将前端文件放到 frontend/dist/
          if [ -d artifacts/frontend-dist ]; then
            rm -rf frontend/dist
            cp -r artifacts/frontend-dist frontend/dist
            echo "✅ Frontend files placed in frontend/dist/"
          else
            echo "❌ Frontend dist not found!"
            exit 1
          fi
      
      - name: Build DEB (ARM64)
        run: |
          # 在根目录运行 electron-builder，因为 package.json 在根目录
          npx electron-builder --linux --arm64 --deb
      
      - name: List generated DEB files
        run: |
          echo "📦 查找生成的 DEB 文件："
          # 根据 package.json 配置，输出目录为 dist/electron
          ls -la dist/electron/
          if ! ls dist/electron/*.deb 1> /dev/null 2>&1; then
            echo "❌ 未找到任何 .deb 文件！"
            exit 1
          fi
      
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-deb
          path: dist/electron/*.deb
          if-no-files-found: error

  build-installer:
    name: Build Installer
    runs-on: ubuntu-latest
    needs: [build-electron]
    steps:
      - name: Download DEB
        uses: actions/download-artifact@v4
        with:
          name: kylin-arm64-deb
          path: ./deb-package
      
      - name: Package Installer
        run: |
          mkdir -p release
          if [ -f deb-package/*.deb ]; then
            tar -czf release/assistance-system-kylin-arm64-v1.2.0.tar.gz deb-package/*.deb
            echo "✅ 安装包创建完成"
          else
            echo "❌ 未找到 DEB 包，构建失败"
            exit 1
          fi
          ls -la release/
      
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: kylin-arm64-installer
          path: release/*.tar.gz
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build ARM64 .deb Package

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: false
        default: '1.2.0'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  APP_VERSION: ${{ github.event.inputs.version || '1.2.0' }}

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') || hashFiles('frontend/package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fakeroot dpkg-dev ruby ruby-dev rubygems build-essential \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 \
            xdg-utils libatspi2.0-0 libuuid1 libsecret-1-0 \
            libasound2 libgbm1 libmagic1 binutils imagemagick
          sudo gem install fpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── 前端构建 ───────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm config set registry https://registry.npmmirror.com
          npm config set @sheetjs:registry https://registry.npmmirror.com
          npm install --legacy-peer-deps --network-timeout=600000
        timeout-minutes: 15

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build
          test -f dist/index.html && echo "Frontend build OK"

      # ── 后端构建 ───────────────────────────
      - name: Install backend dependencies
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install --no-cache-dir --timeout 300 -r backend/requirements.txt
          pip install --no-cache-dir pyinstaller
        timeout-minutes: 10

      - name: Build backend with PyInstaller
        working-directory: backend
        run: |
          SPEC_FILE="assistance-management-backend.spec"
          if [ ! -f "$SPEC_FILE" ]; then
            SPEC_FILE="bumofu-arm64.spec"
          fi
          echo "Using spec: $SPEC_FILE"
          python -m PyInstaller "$SPEC_FILE" --clean --noconfirm
          ls -lh dist/
        timeout-minutes: 20

      # ── 组装打包目录 ───────────────────────
      - name: Organize package directory
        run: |
          PKG_ROOT="dist/deb-package/opt/assistance-management-system"
          mkdir -p "$PKG_ROOT"/{backend,frontend,bin}

          # 后端
          if [ -f backend/dist/assistance-management-backend ]; then
            cp backend/dist/assistance-management-backend "$PKG_ROOT/bin/"
          else
            find backend/dist -type f -executable -exec cp {} "$PKG_ROOT/bin/" \;
          fi
          chmod +x "$PKG_ROOT/bin/"*

          # 前端
          cp -r frontend/dist/* "$PKG_ROOT/frontend/"

          # 启动脚本
          cat > "$PKG_ROOT/bin/start-system.sh" << 'STARTEOF'
          #!/bin/bash
          cd /opt/assistance-management-system
          FRONTEND_DIST_PATH=/opt/assistance-management-system/frontend \
            exec /opt/assistance-management-system/bin/assistance-management-backend
          STARTEOF
          chmod +x "$PKG_ROOT/bin/start-system.sh"

          # .desktop 文件
          mkdir -p dist/deb-package/usr/share/applications
          cat > dist/deb-package/usr/share/applications/assistance-management-system.desktop << 'DESKEOF'
          [Desktop Entry]
          Name=帮扶管理信息系统
          Name[en]=Assistance Management Information System
          Comment=帮扶管理信息桌面系统
          Exec=/opt/assistance-management-system/bin/start-system.sh
          Icon=/opt/assistance-management-system/resources/icon.png
          Terminal=false
          Type=Application
          Categories=Office;
          DESKEOF

          # 图标
          mkdir -p dist/deb-package/usr/share/icons
          cp resources/icon.png dist/deb-package/usr/share/icons/assistance-management-system.png 2>/dev/null || true

      # ── 构建 .deb ──────────────────────────
      - name: Build .deb package
        run: |
          cd dist/deb-package
          fpm -s dir -t deb \
            -n "assistance-management-system" \
            -v "${{ env.APP_VERSION }}" \
            --architecture arm64 \
            --description "帮扶管理信息系统 — 离线桌面应用" \
            --maintainer "lzh745200 <lzh745200@github.com>" \
            --url "https://github.com/lzh745200/Assistance-Management-Information-System" \
            --license "MIT" \
            --depends "libgtk-3-0" \
            --depends "libnotify4" \
            --depends "libnss3" \
            --depends "libxss1" \
            --depends "libxtst6" \
            --depends "libasound2" \
            .
          mkdir -p ../../dist/output
          mv *.deb ../../dist/output/
          ls -lh ../../dist/output/

      - name: Generate checksums
        run: |
          cd dist/output
          sha256sum *.deb > SHA256SUMS
          cat SHA256SUMS

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: assistance-management-system-${{ env.APP_VERSION }}-arm64
          path: dist/output/*.deb
          retention-days: 30

      - name: Build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ env.APP_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | ARM64 |" >> $GITHUB_STEP_SUMMARY
          echo "| .deb | $(ls dist/output/*.deb | head -1) |" >> $GITHUB_STEP_SUMMARY

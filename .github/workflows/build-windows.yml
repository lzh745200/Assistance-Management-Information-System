name: Build Windows Installer (x64 & x86)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            conda-arch: x64
            eb-arch: x64
          - arch: x86
            conda-arch: x86
            eb-arch: ia32

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Node.js (electron-builder + 前端构建；缓存根 npm 缓存)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 3. Conda (统一管理 Python + 重型 C 扩展，避免 x86 源码编译)
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.conda-arch }}
          activate-environment: build
          auto-activate-base: false
          use-only-tar-bz2: true

      # 4. 缓存 Conda 包
      - name: Cache Conda packages
        uses: actions/cache@v4
        with:
          path: ~/conda_pkgs_dir
          key: ${{ runner.os }}-conda-${{ matrix.arch }}-${{ hashFiles('environment.yml') }}
          restore-keys: |
            ${{ runner.os }}-conda-${{ matrix.arch }}-

      # 5. 安装重型依赖 (conda 预编译, 避免 x86 源码编译)
      - name: Install heavy deps via Conda
        shell: bash -l {0}
        run: |
          conda install -c conda-forge numpy pandas scipy scikit-learn openpyxl -y
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            conda install -c conda-forge prophet -y
          else
            echo "PROPHET_UNAVAILABLE=true" >> $GITHUB_ENV
          fi

      # 6. 前端依赖缓存 + 构建
      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-fe-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-fe-

      - name: Build frontend
        shell: bash -l {0}
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          npm run build

      - name: Sync frontend to resources
        shell: pwsh
        run: |
          $source = "frontend\dist"
          $dest = "resources\frontend"
          if (Test-Path $source) {
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
            Write-Host "Frontend resources synced to $dest"
          } else {
            Write-Error "frontend\dist not found"
            exit 1
          fi

      # 7. 版本同步 (仅 tag 触发)
      - name: Sync version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash -l {0}
        run: python scripts/sync_version.py ${{ github.ref_name }}

      # 8. 安装 Python 依赖 + PyInstaller
      - name: Install Python deps
        shell: bash -l {0}
        run: |
          pip install --upgrade pip cython setuptools wheel
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-build.txt

      # 9. PyInstaller 打包后端
      - name: Build backend (PyInstaller)
        shell: bash -l {0}
        run: cd backend && python -m PyInstaller assistance-backend.spec --clean --noconfirm

      # 10. 验证后端产物
      - name: Verify backend exe
        shell: pwsh
        run: |
          if (-not (Test-Path "backend/dist/assistance-backend.exe")) {
            throw "backend exe not found: backend/dist/assistance-backend.exe"
          }
          $size = [math]::Round((Get-Item backend/dist/assistance-backend.exe).Length / 1MB, 1)
          Write-Host "Backend exe size: ${size}MB"

      # 11. 安装 Electron 依赖 (根目录)
      - name: Install Electron deps
        run: npm ci

      # 12. electron-builder 打包 (核心步骤)
      - name: Build installer (electron-builder)
        run: npx electron-builder --win --${{ matrix.eb-arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 13. 上传制品
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ matrix.arch }}
          path: dist/electron/*.exe
          retention-days: 30

      # 14. 发布 Release (仅 tag 触发)
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/electron/*.exe
          generate_release_notes: true

name: Build Windows Installer (x64 & x86)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]
        include:
          - arch: x64
            conda-arch: win-64
          - arch: x86
            conda-arch: win-32

    steps:
      - uses: actions/checkout@v4

      # ----- Node.js -----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ----- Conda 环境（统一管理 Python 及重型依赖）-----
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.arch == 'x64' && 'x64' || 'x86' }}
          activate-environment: build
          auto-activate-base: false
          use-only-tar-bz2: true

      - name: Cache Conda packages
        uses: actions/cache@v4
        with:
          path: ~/conda_pkgs_dir
          key: ${{ runner.os }}-conda-${{ matrix.arch }}-${{ hashFiles('environment.yml') }}
          restore-keys: |
            ${{ runner.os }}-conda-${{ matrix.arch }}-

      # ----- 安装重型依赖（通过 Conda，避免源码编译）-----
      - name: Install core packages via Conda
        shell: bash -l {0}
        run: |
          # 基础计算库（所有架构都有预编译包）
          conda install -c conda-forge numpy pandas scipy scikit-learn matplotlib openpyxl -y
          # prophet 在 32 位下可能没有，条件安装
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            conda install -c conda-forge prophet -y
          else
            echo "PROPHET_UNAVAILABLE=true" >> $GITHUB_ENV
          fi

      # ----- 前端构建（若已缓存则跳过）-----
      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Build frontend
        shell: bash -l {0}
        run: |
          cd frontend
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps --network-timeout=600000
          npm run build

      - name: Prepare frontend resources
        shell: pwsh
        run: |
          $source = "frontend\dist"
          $dest = "resources\frontend"
          if (Test-Path $source) {
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
            Write-Host "Frontend resources copied to $dest"
          } else {
            Write-Error "frontend\dist not found"
            exit 1
          }

      # ----- 版本同步（仅 tag 触发）-----
      - name: Sync version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash -l {0}
        run: python scripts/sync_version.py ${{ github.ref_name }}

      # ----- 安装其余纯 Python 依赖（通过 pip）-----
      - name: Install remaining packages via pip
        shell: bash -l {0}
        run: |
          # 先安装 Cython 和构建工具（预防某些包需要）
          pip install --upgrade pip
          pip install cython setuptools wheel meson-python
          # 安装 requirements.txt 中剩余的包（pip 会跳过已由 conda 安装的）
          pip install -r backend/requirements.txt pyinstaller \
            --timeout 1000 --retries 5

      # ----- PyInstaller 打包 -----
      - name: Build backend with PyInstaller
        shell: bash -l {0}
        run: |
          cd backend
          python -m PyInstaller assistance-management-backend.spec --clean --noconfirm

      - name: Rename backend executable
        shell: pwsh
        run: |
          $exePath = "backend\dist\assistance-management-backend.exe"
          if (Test-Path $exePath) {
            $newName = "assistance-management-backend-${{ matrix.arch }}.exe"
            Rename-Item -Path $exePath -NewName $newName
          } else {
            Write-Error "backend exe not found"
            exit 1
          }

      # ----- NSIS 打包（通过环境变量传递架构）-----
      - name: Package installer with NSIS
        uses: joncloud/makensis-action@v4
        with:
          script-file: build-scripts/installer-simple.nsi
        env:
          ARCH: ${{ matrix.arch }}

      # ----- 上传制品 -----
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ matrix.arch }}
          path: build/dist/*.exe
          retention-days: 30

      - name: Upload backend exe
        uses: actions/upload-artifact@v4
        with:
          name: backend-exe-${{ matrix.arch }}
          path: backend/dist/*.exe
          retention-days: 30
name: Build Windows Installer (x64)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 3. Python x64（x86/32-bit 已放弃：上游科学计算包不再提供 win32 cp311 wheels）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      # 4. 前端依赖缓存 + 构建
      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-fe-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-fe-

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          npm run build

      - name: Sync frontend to resources
        shell: pwsh
        run: |
          $source = "frontend\dist"
          $dest = "resources\frontend"
          if (Test-Path $source) {
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
            Write-Host "Frontend resources synced to $dest"
          } else {
            Write-Error "frontend\dist not found"
            exit 1
          }

      # 5. 版本同步 (仅 tag 触发)
      - name: Sync version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: python scripts/sync_version.py ${{ github.ref_name }}

      # 6. 安装 Python 依赖 + PyInstaller
      - name: Install Python deps
        shell: bash
        run: |
          pip install --upgrade pip cython setuptools wheel
          # prophet 依赖 cmdstan C++ 编译，单独处理（失败不阻断，系统自动降级离线模式）
          grep -vE '^(prophet|cmdstanpy|stanio|pytokens)=' backend/requirements.txt > req-core.txt
          pip install -r req-core.txt
          pip install prophet==1.3.0 2>/dev/null || echo "PROPHET_UNAVAILABLE=true" >> $GITHUB_ENV
          pip install -r backend/requirements-build.txt

      # 7. PyInstaller 打包后端
      - name: Build backend (PyInstaller)
        shell: bash
        run: cd backend && python -m PyInstaller assistance-backend.spec --clean --noconfirm

      # 8. 验证后端产物
      - name: Verify backend exe
        shell: pwsh
        run: |
          if (-not (Test-Path "backend/dist/assistance-backend.exe")) {
            throw "backend exe not found: backend/dist/assistance-backend.exe"
          }
          $size = [math]::Round((Get-Item backend/dist/assistance-backend.exe).Length / 1MB, 1)
          Write-Host "Backend exe size: ${size}MB"

      # 9. 安装 Electron 依赖 (根目录)
      - name: Install Electron deps
        run: npm ci

      # 10. electron-builder 打包
      - name: Build installer (electron-builder)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 11. 上传制品
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-x64
          path: dist/electron/*.exe
          retention-days: 30

      # 12. 发布 Release (仅 tag 触发)
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/electron/*.exe
          generate_release_notes: true

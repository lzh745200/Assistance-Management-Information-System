name: Build Windows Installer (x64 & x86)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 45
    strategy:
      matrix:
        arch: [x64, x86]
        # 为每个架构指定 Python 架构字符串
        include:
          - arch: x64
            python-arch: x64
            nsis-outdir: x64
          - arch: x86
            python-arch: x86
            nsis-outdir: x86

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python (${{ matrix.arch }})
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.python-arch }}

      - name: Sync version (if tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: python scripts/sync_version.py ${{ github.ref_name }}

      # ------------------- 前端构建（每个架构都会构建，但产物相同） -------------------
      - name: Build frontend
        run: |
          cd frontend
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps --network-timeout=600000
          npm run build

      # ------------------- 准备前端资源给 PyInstaller -------------------
      - name: Prepare frontend resources
        shell: pwsh
        run: |
          $source = "frontend\dist"
          $dest = "resources\frontend"
          if (Test-Path $source) {
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
            Write-Host "Frontend resources copied to $dest"
          } else {
            Write-Error "frontend\dist not found – please check your frontend build output folder"
            exit 1
          }

      # ------------------- 安装 Python 依赖（注意不同架构可能有些包需要不同） -------------------
      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt pyinstaller

      # ------------------- 打包后端（使用修复后的 spec） -------------------
      - name: Build backend with PyInstaller
        run: |
          cd backend
          python -m PyInstaller assistance-management-backend.spec --clean --noconfirm

      # ------------------- 重命名生成的 exe 以区分架构 -------------------
      - name: Rename backend executable
        shell: pwsh
        run: |
          $exePath = "backend\dist\assistance-management-backend.exe"
          if (Test-Path $exePath) {
            $newName = "assistance-management-backend-${{ matrix.arch }}.exe"
            Rename-Item -Path $exePath -NewName $newName
            Write-Host "Renamed to $newName"
          } else {
            Write-Error "backend exe not found"
            exit 1
          }

      # ------------------- NSIS 打包（传递架构参数） -------------------
      - name: Package installer with NSIS
        uses: joncloud/makensis-action@v4
        with:
          script-file: build-scripts/installer-simple.nsi
          # 可以通过 arguments 传递架构变量，需在 NSIS 脚本中接收
          # 例如 arguments: "/DARCH=${{ matrix.arch }}"
          # 但 makensis-action 目前不支持直接传参，我们可以通过环境变量或修改脚本
          # 我们采用在 NSIS 脚本中读取环境变量 ARCH 的方式
        env:
          ARCH: ${{ matrix.arch }}

      # 注意：NSIS 脚本需要根据环境变量 ARCH 来设置输出文件名，例如：
      # !ifdef ARCH
      #   OutFile "build\dist\setup-${ARCH}.exe"
      # !else
      #   OutFile "build\dist\setup.exe"
      # !endif

      # ------------------- 上传 artifact（区分架构） -------------------
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ matrix.arch }}
          path: build/dist/*.exe
          retention-days: 30

      - name: Upload backend exe
        uses: actions/upload-artifact@v4
        with:
          name: backend-exe-${{ matrix.arch }}
          path: backend/dist/*.exe
          retention-days: 30
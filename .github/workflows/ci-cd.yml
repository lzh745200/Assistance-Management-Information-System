name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════
  #  后端：代码质量门禁 + 测试
  # ═══════════════════════════════════════════════════════════
  backend-lint-and-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-timeout

      - name: Lint with flake8
        run: python -m flake8 app/ --max-line-length=120 --count --statistics

      - name: Type Check (mypy)
        run: python -m mypy app/ --ignore-missing-imports --check-untyped-defs || true
        # NOTE: mypy 警告暂不阻塞 CI，逐步修复后移除 || true

      - name: Security Scan (bandit)
        run: python -m bandit -r app/ -ll -x tests/ --confidence-level=medium

      - name: Complexity Check (radon)
        run: |
          python -m radon cc app/ --min B --total-average || true
          echo "::notice:: 圈复杂度超过 B 级的模块需要后续重构（不阻塞 CI）"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short -q \
            --timeout=60 -x \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=45
        env:
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key-for-ci
          CSRF_SECRET_KEY: test-csrf-key-for-ci
          DATABASE_URL: "sqlite:///./test_ci.db"

      - name: Upload coverage to Codecov (optional)
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          working-directory: backend
          files: coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ═══════════════════════════════════════════════════════════
  #  前端：代码质量门禁 + 测试 + 构建
  # ═══════════════════════════════════════════════════════════
  frontend-lint-and-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Run unit tests with coverage
        run: npx vitest run --reporter=verbose --coverage

      - name: Build
        run: npm run build

      - name: Upload frontend coverage (optional)
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          working-directory: frontend
          directory: coverage
          flags: frontend
          fail_ci_if_error: false

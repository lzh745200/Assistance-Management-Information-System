name: PR Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r backend/requirements.txt pytest-xdist pytest-cov pytest-rerunfailures
      # 覆盖率门禁：基线 50%，跌破则 CI 红（与 pyproject.toml fail_under 一致）
      - run: cd backend && python -m pytest tests/ -q --tb=line -n auto --dist loadfile --cov=app --cov-report=xml --cov-fail-under=50 --reruns 2 --reruns-delay 1
      # 上传覆盖率到 Codecov
      - uses: codecov/codecov-action@v4
        with:
          directory: backend
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with: { node-version: '22' }
      - run: |
          cd frontend
          npm install --legacy-peer-deps
      - run: cd frontend && npx vue-tsc --noEmit
      - run: cd frontend && npm run lint
      # 前端测试带覆盖率报告（vitest run --coverage）
      - run: cd frontend && npx vitest run --coverage
      # 上传覆盖率到 Codecov
      - uses: codecov/codecov-action@v4
        with:
          directory: frontend
          flags: frontend
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install flake8 mypy bandit
      # flake8 零错误门禁
      - run: cd backend && python -m flake8 app/ --max-line-length=120 --count --max-complexity=16
      # mypy 类型检查（非阻断，但报告类型问题）
      - name: mypy type check
        run: cd backend && python -m mypy app/ --config-file=mypy.ini --ignore-missing-imports || true
      # bandit 安全扫描（低级别，阻断）
      - name: bandit security scan
        run: cd backend && python -m bandit -r app/ -ll

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v5
        with: { node-version: '22' }
      # 后端依赖漏洞扫描（pip-audit）
      - run: pip install pip-audit pip-licenses
      - name: Backend dependency audit
        run: pip-audit -r backend/requirements.txt
      # 前端依赖漏洞扫描（npm audit，仅 high 以上阻断）
      - name: Frontend dependency audit
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm audit --audit-level=high
      # 生成 SBOM（许可证清单），作为 artifact 上传供军口许可证白名单审查
      - name: Generate SBOM (license list)
        run: |
          pip-licenses --from=mixed --with-system --with-description --format=csv --output-file=sbom.csv || true
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-license-list
          path: sbom.csv
          if-no-files-found: warn

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v5
        with: { node-version: '22' }
      # 版本一致性门禁：sync-version.js --check 检测 13 处版本号漂移
      - name: Version consistency check
        run: node scripts/sync-version.js --check
      # 后端静态分析：检查裸 db.commit()、缺 safe_commit 导入等模式
      - name: Backend safe_commit audit
        run: |
          cd backend && python -c "
          import os, re, sys
          violations = []
          for root, dirs, files in os.walk('app/api'):
              for f in files:
                  if not f.endswith('.py'): continue
                  fp = os.path.join(root, f)
                  with open(fp, encoding='utf-8') as fh:
                      content = fh.read()
                  # 检查裸 db.commit()
                  if re.search(r'^\s+db\.commit\(\)$', content, re.MULTILINE):
                      violations.append(f'  {fp}: bare db.commit() found')
          if violations:
              print('BARE db.commit() VIOLATIONS:')
              print('\n'.join(violations))
              sys.exit(1)
          else:
              print('No bare db.commit() found — all commits use safe_commit()')
          "
      # 前端静态分析：检查 Pattern A（import request from './request'）残留
      - name: Frontend API pattern audit
        run: |
          cd frontend && npx vue-tsc --noEmit && echo 'TypeScript check passed'
      # 检查前端 API 调用是否使用具名导入
      - name: Frontend import pattern audit
        run: |
          cd frontend && node -e "
          const fs = require('fs');
          const path = require('path');
          function walk(dir) {
            const results = [];
            for (const entry of fs.readdirSync(dir, {withFileTypes: true})) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory() && !entry.name.startsWith('.') && entry.name !== 'node_modules') {
                results.push(...walk(full));
              } else if (entry.isFile() && (entry.name.endsWith('.ts') || entry.name.endsWith('.vue'))) {
                results.push(full);
              }
            }
            return results;
          }
          const violations = [];
          for (const fp of walk('src/api')) {
            const content = fs.readFileSync(fp, 'utf-8');
            if (content.includes("import request from './request'") || content.includes('import request from "./request"')) {
              violations.push(fp);
            }
          }
          if (violations.length) {
            console.error('Pattern A violations (should use named imports):');
            violations.forEach(v => console.error('  ' + v));
            process.exit(1);
          } else {
            console.log('All API files use Pattern B (named imports)');
          }
          "

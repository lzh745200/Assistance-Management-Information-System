# Pre-commit hooks configuration
# 安装: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix, --max-line-length=120]
        files: ^backend/

  - repo: local
    hooks:
      - id: flake8
        name: flake8
        entry: bash -c 'cd backend && python -m flake8 app/ --max-line-length=120 --max-warnings=0 --count'
        language: system
        files: ^backend/app/
        pass_filenames: false

      - id: bandit
        name: bandit (security)
        entry: bash -c 'cd backend && python -m bandit -r app/ -c ../.bandit || true'
        language: system
        files: ^backend/app/
        pass_filenames: false

      - id: vue-tsc
        name: vue-tsc
        entry: bash -c 'cd frontend && npx vue-tsc --noEmit'
        language: system
        files: ^frontend/src/
        pass_filenames: false

# Pre-commit hooks configuration
# 安装: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix, --line-length=120]
        files: ^backend/

  - repo: local
    hooks:
      - id: check-dockerfile-tail
        name: check Dockerfile RUN has | tail
        entry: python scripts/pre_commit_hooks.py check_dockerfile_tail
        language: system
        files: ^docker/Dockerfile
        pass_filenames: false

      - id: flake8
        name: flake8
        entry: python scripts/pre_commit_hooks.py flake8
        language: system
        pass_filenames: false

      - id: bandit
        name: bandit (security)
        entry: python scripts/pre_commit_hooks.py bandit
        language: system
        pass_filenames: false

      - id: vue-tsc
        name: vue-tsc
        entry: python scripts/pre_commit_hooks.py vue_tsc
        language: system
        pass_filenames: false

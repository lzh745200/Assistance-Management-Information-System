[tool.pytest.ini_options]
# 测试目录
testpaths = ["tests"]

# 测试文件模式
python_files = ["test_*.py", "*_test.py"]

# 测试类模式
python_classes = ["Test*"]

# 测试函数模式
python_functions = ["test_*"]

# 标记定义
markers = [
    "slow: 标记为慢速测试（长稳测试）",
    "stress: 标记为压力测试",
    "integration: 标记为集成测试",
    "e2e: 标记为端到端测试",
    "security: 标记为安全测试",
    "performance: 标记为性能测试",
]

# 输出选项
addopts = [
    "-v",                          # 详细输出
    "--tb=short",                  # 简短的回溯信息
    "--strict-markers",            # 严格标记模式
    # 覆盖率检查通过 --cov 参数单独启用
]

# asyncio 默认事件循环作用域（消除 pytest-asyncio 弃用警告）
asyncio_default_fixture_loop_scope = "function"
# 设为 auto：async fixture/测试 自动 mark，无需每个 @pytest.mark.asyncio
# （strict 模式 1.x 默认对 sync fixture 在 autouse 场景下抛错）
asyncio_mode = "auto"

# 警告过滤
filterwarnings = [
    "ignore::DeprecationWarning:pydantic.*:",
    "ignore::PendingDeprecationWarning:pydantic.*:",
    "ignore::DeprecationWarning:httpx.*:",
    "ignore::DeprecationWarning:app.services.event_bus.*:",
    "ignore::pytest.PytestConfigWarning:_pytest.config.*:",
]

# 覆盖率配置
[tool.coverage.run]
source = ["app"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/venv/*",
    "*/.venv/*",
    # 不可单元测试的工具（需外部依赖/手动运行）
    "*/app/utils/chart.py",             # matplotlib 图表生成，需图形环境
    "*/app/utils/email.py",              # SMTP 邮件发送，需真实邮件服务器
    "*/app/utils/database_init.py",      # 数据库初始化 CLI 工具，一次性运行
    "*/app/utils/database_migration.py", # 数据库迁移 CLI 工具，一次性运行
    "*/app/utils/database_indexes.py",   # 索引创建 CLI 工具，一次性运行
    "*/app/utils/init_permissions.py",   # 权限初始化 CLI 工具，一次性运行
    "*/app/utils/secret_migration.py",   # 密钥迁移 CLI 工具，一次性运行
    "*/app/utils/db_performance.py",     # 数据库性能 CLI 工具
    "*/app/utils/performance.py",        # 性能测试 CLI 工具
    "*/app/utils/export.py",             # 导出 CLI 工具
    "*/app/utils/query_optimizer.py",    # 查询优化 CLI 工具
    "*/app/utils/encryption.py",         # 加密工具（与 encryption_service 重复）
    "*/app/config.py",                   # 简单配置
    # 以下文件目前无测试且为工具/脚本性质
    "*/app/api/dependencies/permissions.py",  # 依赖项，需集成测试
    "*/app/api/v1/data/conflict_resolution.py",
    "*/app/api/v1/data/incremental_update.py",
    "*/app/api/v1/data/package_versions.py",
    "*/app/api/v1/system/data_tier.py",
    "*/app/api/v1/system_init.py",
    "*/app/api/v1/village/__init__.py",
    "*/app/api/v1/village/crud.py",
    "*/app/api/v1/village/export.py",
    "*/app/api/v1/village/schemas.py",
    "*/app/api/v1/village/statistics.py",
    "*/app/api/v1/village/template.py",
    "*/app/api/v1/village_templates.py",
    "*/app/api/v1/messages_extended.py",
    "*/app/application/services/permission_service.py",
    "*/app/core/audit.py",
    "*/app/core/auth_root.py",
    # 仅保留：数据库兼容层、过时/废弃模块
    "*/app/core/database_compat.py",
    "*/app/core/logging_config.py",
    "*/app/core/structured_logging.py",
    # 仅保留：实验性/外部中间件
    # 服务层 — 移除排除，所有服务应被覆盖
    "*/app/services/zero_trust/*.py",
    # 仅保留：生成的/第三方/初始化文件
    "*/app/services/domain/**/*.py",
    "*/app/services/aircraft/*.py",
    "*/app/services/funding/__init__.py",
    "*/app/services/village/__init__.py",
    "*/app/services/project/__init__.py",
    # 其他 — 仅保留生成文件和遗留代码
    "*/app/dependencies.py",
    "*/app/exceptions.py",
    "*/app/static_files.py",
]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 40  # 当前基线 43.39%，逐步提升至 50% → 70%

exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.coverage.html]
directory = "htmlcov"


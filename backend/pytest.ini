[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=line --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    unit: unit tests
    integration: integration tests (need database)
    security: security-related tests
    approval: approval workflow tests
    e2e: end-to-end tests
    stress: marks tests as stress tests
    performance: marks tests as performance tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:Using.*httpx.*with.*starlette.testclient.*is deprecated:Warning
    ignore:transaction already deassociated from connection:Warning
    ignore::DeprecationWarning:pydantic.*
    ignore::PendingDeprecationWarning:pydantic.*
    ignore::DeprecationWarning:httpx.*
    ignore::DeprecationWarning:app.services.event_bus.*
    ignore::pytest.PytestConfigWarning:_pytest.config.*
    # fire-and-forget / AsyncMock 测试刻意产生的未 await 协程（良性，非产品缺陷）
    ignore:coroutine '.*' was never awaited:RuntimeWarning

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rural-backend
  labels:
    app: rural-system
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rural-system
      component: backend
  template:
    metadata:
      labels:
        app: rural-system
        component: backend
    spec:
      containers:
        - name: backend
          image: rural-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: rural-system-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rural-system-secret
                  key: secret-key
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: data
              mountPath: /app/uploads
              subPath: uploads
            - name: data
              mountPath: /app/logs
              subPath: logs
          livenessProbe:
            httpGet:
              path: /api/v1/system/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/system/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rural-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rural-backend
  labels:
    app: rural-system
    component: backend
spec:
  selector:
    app: rural-system
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP

apiVersion: v1
kind: ConfigMap
metadata:
  name: rural-system-config
  namespace: default
  labels:
    app: rural-system
data:
  DATABASE_URL: "sqlite:///./data/assistance_management.db"
  UPLOAD_DIR: "/app/uploads"
  LOG_DIR: "/app/logs"
  CORS_ORIGINS: "http://localhost,http://rural-frontend"
  ACCESS_TOKEN_EXPIRE_MINUTES: "480"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"

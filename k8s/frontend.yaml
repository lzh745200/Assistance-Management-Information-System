apiVersion: apps/v1
kind: Deployment
metadata:
  name: rural-frontend
  labels:
    app: rural-system
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rural-system
      component: frontend
  template:
    metadata:
      labels:
        app: rural-system
        component: frontend
    spec:
      containers:
        - name: frontend
          image: rural-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: rural-frontend
  labels:
    app: rural-system
    component: frontend
spec:
  selector:
    app: rural-system
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: NodePort

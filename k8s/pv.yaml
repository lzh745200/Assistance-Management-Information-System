apiVersion: v1
kind: PersistentVolume
metadata:
  name: rural-data-pv
  labels:
    app: rural-system
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/rural-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rural-data-pvc
  labels:
    app: rural-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

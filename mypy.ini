[mypy]
# 帮扶管理信息系统 mypy 配置（渐进式 strict，先非阻塞）
# 当前阶段：非阻塞运行，逐步收紧；CI 暂不阻断。
python_version = 3.11
ignore_missing_imports = True
follow_imports = silent
warn_redundant_casts = True
warn_unused_ignores = True
check_untyped_defs = False
disallow_untyped_defs = False
warn_return_any = False
exclude = (?x)(
    ^backend/tests/|
    ^backend/build/|
    ^build/|
    ^dist/
  )

# 第三方库无类型存根时静默
[mypy-sqlalchemy.*]
ignore_missing_imports = True
[mypy-pydantic.*]
ignore_missing_imports = True
[mypy-fastapi.*]
ignore_missing_imports = True
[mypy-uvicorn.*]
ignore_missing_imports = True
[mypy-alembic.*]
ignore_missing_imports = True
[mypy-passlib.*]
ignore_missing_imports = True
[mypy-jose.*]
ignore_missing_imports = True

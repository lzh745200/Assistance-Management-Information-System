<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组织管理新增测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-section h3 {
            margin-top: 0;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>组织管理新增测试</h1>

    <div class="test-section">
        <h3>1. 登录</h3>
        <button onclick="testLogin()">测试登录</button>
        <div id="login-result"></div>
    </div>

    <div class="test-section">
        <h3>2. 查询当前组织列表（is_active=true）</h3>
        <button onclick="testListBefore()">查询列表</button>
        <div id="list-before-result"></div>
    </div>

    <div class="test-section">
        <h3>3. 新增组织</h3>
        <button onclick="testCreate()">新增组织</button>
        <div id="create-result"></div>
    </div>

    <div class="test-section">
        <h3>4. 查询新增后的组织列表（is_active=true）</h3>
        <button onclick="testListAfter()">查询列表</button>
        <div id="list-after-result"></div>
    </div>

    <script>
        const BASE_URL = 'http://127.0.0.1:8000/api/v1';
        let token = '';
        let createdOrgId = null;
        let beforeCount = 0;

        async function testLogin() {
            const resultDiv = document.getElementById('login-result');
            resultDiv.innerHTML = '登录中...';

            try {
                const response = await fetch(`${BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });

                const data = await response.json();
                if (data.data && data.data.access_token) {
                    token = data.data.access_token;
                    resultDiv.innerHTML = `<span class="success">✓ 登录成功</span><br>Token: ${token.substring(0, 20)}...`;
                } else {
                    resultDiv.innerHTML = `<span class="error">✗ 登录失败</span><pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">✗ 错误: ${error.message}</span>`;
            }
        }

        async function testListBefore() {
            const resultDiv = document.getElementById('list-before-result');
            if (!token) {
                resultDiv.innerHTML = '<span class="error">请先登录</span>';
                return;
            }

            resultDiv.innerHTML = '查询中...';

            try {
                const response = await fetch(`${BASE_URL}/organizations?is_active=true&page_size=100`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                beforeCount = data.total || 0;
                resultDiv.innerHTML = `
                    <span class="success">✓ 查询成功</span><br>
                    当前组织数量: ${beforeCount}<br>
                    <pre>${JSON.stringify(data.items.map(i => ({id: i.id, name: i.name, is_active: i.is_active})), null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">✗ 错误: ${error.message}</span>`;
            }
        }

        async function testCreate() {
            const resultDiv = document.getElementById('create-result');
            if (!token) {
                resultDiv.innerHTML = '<span class="error">请先登录</span>';
                return;
            }

            resultDiv.innerHTML = '创建中...';

            const timestamp = Date.now();
            const createData = {
                name: `前端测试组织_${timestamp}`,
                code: `FE_TEST_${timestamp}`,
                org_type: 'department',
                is_active: true,
                description: '前端测试新增'
            };

            try {
                const response = await fetch(`${BASE_URL}/organizations`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(createData)
                });

                const data = await response.json();
                if (data.id) {
                    createdOrgId = data.id;
                    resultDiv.innerHTML = `
                        <span class="success">✓ 创建成功</span><br>
                        组织ID: ${data.id}<br>
                        组织名称: ${data.name}<br>
                        is_active: ${data.is_active}<br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `<span class="error">✗ 创建失败</span><pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">✗ 错误: ${error.message}</span>`;
            }
        }

        async function testListAfter() {
            const resultDiv = document.getElementById('list-after-result');
            if (!token) {
                resultDiv.innerHTML = '<span class="error">请先登录</span>';
                return;
            }

            if (!createdOrgId) {
                resultDiv.innerHTML = '<span class="error">请先创建组织</span>';
                return;
            }

            resultDiv.innerHTML = '查询中...';

            try {
                const response = await fetch(`${BASE_URL}/organizations?is_active=true&page_size=100`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                const afterCount = data.total || 0;
                const found = data.items.find(item => item.id === createdOrgId);

                let html = `
                    <span class="success">✓ 查询成功</span><br>
                    当前组织数量: ${afterCount}<br>
                    数量变化: ${beforeCount} → ${afterCount} (${afterCount - beforeCount >= 0 ? '+' : ''}${afterCount - beforeCount})<br>
                `;

                if (found) {
                    html += `
                        <br><span class="success">✓ 找到新创建的组织</span><br>
                        ID: ${found.id}<br>
                        名称: ${found.name}<br>
                        is_active: ${found.is_active}<br>
                    `;
                } else {
                    html += `
                        <br><span class="error">✗ 未找到新创建的组织 (ID=${createdOrgId})</span><br>
                    `;
                }

                html += `<pre>${JSON.stringify(data.items.map(i => ({id: i.id, name: i.name, is_active: i.is_active})), null, 2)}</pre>`;
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">✗ 错误: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
